<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Productividad — Reempaque</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0ede6;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:12px;}
.reg{background:#fff;border:2px solid #8B6914;width:100%;max-width:380px;border-radius:4px;overflow:hidden;}
.reg-header{background:#c8a84b;border-bottom:2px solid #8B6914;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.reg-logo{background:#1a3a5c;color:#fff;font-weight:900;font-size:11px;padding:3px 8px;border-radius:2px;}
.reg-title{color:#fff;font-size:11px;font-weight:700;text-align:center;flex:1;padding:0 8px;}
.reg-body{padding:14px;}
.reg-subtitle{background:#1a3a5c;color:#fff;font-size:10px;font-weight:700;text-align:center;padding:6px;border-radius:3px;margin-bottom:12px;letter-spacing:.5px;}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;}
.mcard{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:7px 4px;text-align:center;}
.mval{font-size:24px;font-weight:700;color:#1a3a5c;}
.mlbl{font-size:7px;color:#888;margin-top:2px;}
.field-group{margin-bottom:10px;}
.field-lbl{font-size:10px;font-weight:700;color:#555;margin-bottom:4px;}
.field-inp{width:100%;border:2px solid #8B6914;border-radius:4px;padding:12px;font-size:28px;font-weight:700;color:#1a3a5c;text-align:center;background:#fff;outline:none;}
.field-inp:focus{border-color:#1a3a5c;}
.field-sel{width:100%;border:2px solid #8B6914;border-radius:4px;padding:10px;font-size:15px;font-weight:700;color:#1a3a5c;background:#fff;outline:none;}
.zona-indicator{border-radius:4px;padding:10px;text-align:center;font-size:11px;font-weight:700;margin-bottom:12px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.zona-vacia{background:#f5f5f5;color:#aaa;border:1px dashed #ccc;}
.zona-verde{background:#d4edda;color:#155724;border:1px solid #27ae60;}
.zona-amarilla{background:#fff3cd;color:#856404;border:1px solid #f1c40f;}
.zona-roja{background:#f8d7da;color:#721c24;border:1px solid #e74c3c;}
.btn-reg{background:#1a3a5c;color:#fff;border:none;border-radius:4px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;letter-spacing:.5px;}
.btn-reg:active{background:#2c5f8a;}
.btn-reset{background:#fff;color:#888;border:1px solid #ccc;border-radius:4px;padding:8px;font-size:10px;cursor:pointer;width:100%;}
.btn-reset:active{background:#f5f5f5;}
.historial{margin-top:12px;border-top:1px solid #e0d0a0;padding-top:8px;}
.hist-title{font-size:9px;font-weight:700;color:#8B6914;margin-bottom:5px;}
.badges{display:flex;flex-wrap:wrap;gap:3px;}
.badge{font-size:8px;padding:3px 7px;border-radius:10px;font-weight:700;}
.bg{background:#27ae60;color:#fff;}
.by{background:#f1c40f;color:#7a6000;}
.br{background:#e74c3c;color:#fff;}
.be{background:#e8e8e8;color:#999;}
</style>
</head>
<body>
<div class="reg">
  <div class="reg-header">
    <div class="reg-logo">ABInBev</div>
    <div class="reg-title">OPERADOR DE REEMPAQUE</div>
  </div>
  <div class="reg-body">
    <div class="reg-subtitle">REGISTRO DE PRODUCTIVIDAD POR HORA</div>
    <div class="metrics">
      <div class="mcard"><div class="mval" id="mActual">—</div><div class="mlbl">Última hora</div></div>
      <div class="mcard"><div class="mval" id="mProm">—</div><div class="mlbl">Promedio</div></div>
      <div class="mcard"><div class="mval" id="mCump" style="color:#27ae60;">—</div><div class="mlbl">Cumplimiento</div></div>
    </div>
    <div class="field-group">
      <div class="field-lbl">Hora del turno</div>
      <select class="field-sel" id="horaInp"></select>
    </div>
    <div class="field-group">
      <div class="field-lbl">Cajas producidas</div>
      <input class="field-inp" id="cajasInp" type="number" min="0" max="99" placeholder="0" inputmode="numeric">
    </div>
    <div class="zona-indicator zona-vacia" id="zonaPreview">Ingresa las cajas para ver la zona</div>
    <button class="btn-reg" onclick="registrar()">REGISTRAR</button>
    <button class="btn-reset" onclick="resetDatos()">Reiniciar turno</button>
    <div class="historial">
      <div class="hist-title">Historial del turno</div>
      <div class="badges" id="badges"></div>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9N801JB2TLT7HGNVQfbNuBOJiCeM0mds",
  authDomain: "reempaque-abi.firebaseapp.com",
  projectId: "reempaque-abi",
  storageBucket: "reempaque-abi.firebasestorage.app",
  messagingSenderId: "213854558551",
  appId: "1:213854558551:web:9769b2b7e5246b7f024612"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const turnoRef = doc(db, "reempaque", "turno_actual");

const META=16,PREV_MIN=12;
const HORAS=['6:00','7:00','8:00','9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];
let datos={};

const sel=document.getElementById('horaInp');
HORAS.forEach(h=>{const o=document.createElement('option');o.value=h;o.textContent=h;sel.appendChild(o);});
sel.selectedIndex=Math.max(0,Math.min(new Date().getHours()-6,HORAS.length-1));

onSnapshot(turnoRef, (snap) => {
  datos = snap.exists() ? (snap.data().horas || {}) : {};
  drawBadges(); drawMetrics();
});

function colorFor(v){if(v>=META)return '#27ae60';if(v>=PREV_MIN)return '#c9a800';return '#e74c3c';}
function updatePreview(){
  const v=parseInt(document.getElementById('cajasInp').value);
  const el=document.getElementById('zonaPreview');
  if(isNaN(v)||v<0){el.className='zona-indicator zona-vacia';el.textContent='Ingresa las cajas para ver la zona';return;}
  if(v>=META){el.className='zona-indicator zona-verde';el.textContent='Zona Verde — Meta cumplida ('+v+' CA/H)';}
  else if(v>=PREV_MIN){el.className='zona-indicator zona-amarilla';el.textContent='Zona Preventiva — Por debajo de meta ('+v+' CA/H)';}
  else{el.className='zona-indicator zona-roja';el.textContent='Zona Reactiva — Requiere acción ('+v+' CA/H)';}
}
document.getElementById('cajasInp').addEventListener('input',updatePreview);
function drawBadges(){
  const c=document.getElementById('badges');c.innerHTML='';
  HORAS.forEach(h=>{
    const v=datos[h];const b=document.createElement('span');
    if(v===undefined){b.className='badge be';b.textContent=h;}
    else if(v>=META){b.className='badge bg';b.textContent=h+': '+v;}
    else if(v>=PREV_MIN){b.className='badge by';b.textContent=h+': '+v;}
    else{b.className='badge br';b.textContent=h+': '+v;}
    c.appendChild(b);
  });
}
function drawMetrics(){
  const vals=HORAS.map(h=>datos[h]).filter(v=>v!==undefined);
  const ult=vals.length?vals[vals.length-1]:null;
  const prom=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  const cump=vals.length?Math.round(vals.filter(v=>v>=META).length/vals.length*100):null;
  const ea=document.getElementById('mActual');
  ea.textContent=ult!==null?ult:'—';ea.style.color=ult===null?'#1a3a5c':colorFor(ult);
  document.getElementById('mProm').textContent=prom!==null?prom:'—';
  const ec=document.getElementById('mCump');
  ec.textContent=cump!==null?cump+'%':'—';
  ec.style.color=cump===null?'#27ae60':cump>=80?'#27ae60':cump>=50?'#c9a800':'#e74c3c';
}
window.registrar = async function(){
  const v=parseInt(document.getElementById('cajasInp').value);
  const h=document.getElementById('horaInp').value;
  if(isNaN(v)||v<0||v>99){alert('Ingresa un número válido (0-99).');return;}
  datos[h]=v;
  await setDoc(turnoRef, { horas: datos }, { merge: true });
  document.getElementById('cajasInp').value='';
  document.getElementById('zonaPreview').className='zona-indicator zona-vacia';
  document.getElementById('zonaPreview').textContent='Ingresa las cajas para ver la zona';
  document.getElementById('horaInp').selectedIndex=Math.min(HORAS.indexOf(h)+1,HORAS.length-1);
}
window.resetDatos = async function(){
  if(!confirm('¿Reiniciar todos los datos del turno?'))return;
  datos={};
  await setDoc(turnoRef, { horas: {} });
}
document.getElementById('cajasInp').addEventListener('keydown',e=>{if(e.key==='Enter')registrar();});
</script>
</body>
</html>
